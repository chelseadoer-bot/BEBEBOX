<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>베베박스 · 운영자 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root{--accent:#ff6b3d;--bg:#f6f4f0;--card:#fff;--text:#2b2622;--sub:#7a7068;--muted:#a8a098;--border:#e8e2d9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard",system-ui,sans-serif;background:var(--bg);color:var(--text);letter-spacing:-.01em}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 60px}
h1{font-size:22px;font-weight:800}
.sub{color:var(--sub);font-size:13px;margin-top:4px}
.gate{max-width:360px;margin:80px auto;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;text-align:center}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;margin:14px 0}
.btn{border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:800;padding:12px 18px;cursor:pointer;font-family:inherit}
.btn.ghost{background:#efe9e1;color:var(--text)}
.hidden{display:none}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0 14px}
.search{flex:1;min-width:200px;padding:11px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;background:#fff}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.kpi b{display:block;font-size:22px;font-weight:800;color:var(--accent)}
.kpi span{font-size:12px;color:var(--sub)}
.layout{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:860px){.layout{grid-template-columns:1.1fr 1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-h{padding:14px 16px;font-weight:800;font-size:14px;border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid #f1ece4}
th{color:var(--sub);font-weight:700;font-size:12px;background:#faf7f3}
tbody tr{cursor:pointer}
tbody tr:hover{background:#fff8f3}
.num{text-align:right;font-variant-numeric:tabular-nums}
.detail-empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px}
.sec{padding:14px 16px;border-bottom:1px solid #f1ece4}
.sec-title{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:10px}
.gift-row,.giver-row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px dashed #efe7dc;font-size:13px}
.gift-row:last-child,.giver-row:last-child{border-bottom:none}
.tag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
.tag.recv{background:#eafaef;color:#34a853}
.tag.need{background:#fff2ec;color:#ff6b3d}
.giver-name{font-weight:800}
.giver-meta{color:var(--sub);font-size:12px}
.msg{color:var(--sub);font-size:12px;font-style:italic}
.tl{font-size:12px;color:var(--sub);padding:6px 0;border-bottom:1px dashed #efe7dc}
.pill{display:inline-block;font-size:11px;font-weight:700;color:#7a5240;background:#fff2ec;border-radius:999px;padding:1px 7px;margin-right:4px}
</style>
</head>
<body>
<div id="gate" class="gate">
<h1>운영자 대시보드</h1>
<p class="sub">관리자 키를 입력하세요</p>
<input type="password" id="key-input" placeholder="admin key" autocomplete="off"/>
<button class="btn" id="gate-btn" style="width:100%">들어가기</button>
</div>

<div id="app" class="wrap hidden">
<h1>베베박스 운영자 대시보드</h1>
<p class="sub">회원(가족) 단위로 누구에게 줘야 하는지·누가 조각을 얼마나 썼는지 확인하세요</p>
<div class="kpis" id="kpis"></div>
<div class="topbar">
<input class="search" id="search" placeholder="가족코드 또는 아기 이름으로 검색"/>
<button class="btn ghost" id="refresh">새로고침</button>
</div>
<div class="layout">
<div class="card">
<div class="card-h">회원(가족) 목록</div>
<div style="overflow:auto;max-height:70vh">
<table>
<thead><tr><th>아기 / 코드</th><th class="num">기록</th><th class="num">공개</th><th class="num">조회</th><th class="num">클릭</th><th class="num">완료</th></tr></thead>
<tbody id="members"></tbody>
</table>
</div>
</div>
<div class="card">
<div class="card-h" id="detail-title">회원 상세</div>
<div id="detail"><div class="detail-empty">왼쪽에서 회원을 선택하세요</div></div>
</div>
</div>
</div>

<script>
var KEY = localStorage.getItem("bbx_admin_key") || "";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
async function api(path){
  var r = await fetch(path + (path.indexOf("?")>=0?"&":"?") + "key=" + encodeURIComponent(KEY));
  if(r.status===401){throw new Error("unauthorized");}
  return r.json();
}
function showApp(){document.getElementById("gate").classList.add("hidden");document.getElementById("app").classList.remove("hidden");}
async function loadAll(){
  try{
    var s = await api("/api/admin/stats");
    var by = s.by_type||{};
    document.getElementById("kpis").innerHTML =
      kpi(s.families,"가족(회원)")+kpi(s.events,"총 이벤트")+
      kpi(by.share_view||0,"공유 조회")+kpi(by.gift_click||0,"선물 클릭")+
      kpi(by.gift_done||0,"선물 완료")+kpi(by.record||0,"기록");
    await loadMembers("");
    showApp();
  }catch(e){ alert("키가 올바르지 않습니다."); }
}
function kpi(n,l){return '<div class="kpi"><b>'+(n||0)+'</b><span>'+l+'</span></div>';}
async function loadMembers(q){
  var j = await api("/api/admin/members?q="+encodeURIComponent(q||""));
  var tb = document.getElementById("members");
  if(!j.members.length){tb.innerHTML='<tr><td colspan="6" style="color:#a8a098">회원이 없어요</td></tr>';return;}
  tb.innerHTML = j.members.map(function(m){
    return '<tr data-fam="'+esc(m.family_id)+'"><td><b>'+esc(m.baby)+'</b><br/><span style="color:#a8a098;font-size:11px">'+esc(m.family_id)+'</span></td>'+
      '<td class="num">'+m.records+'</td><td class="num">'+m.published+'</td><td class="num">'+m.views+'</td><td class="num">'+m.gift_clicks+'</td><td class="num">'+m.gifts_done+'</td></tr>';
  }).join("");
  tb.querySelectorAll("tr[data-fam]").forEach(function(tr){tr.onclick=function(){loadDetail(tr.dataset.fam);};});
}
async function loadDetail(fam){
  document.getElementById("detail-title").textContent = "회원 상세 · " + fam;
  var d = await api("/api/admin/member?family="+encodeURIComponent(fam));
  var f = d.funnel||{};
  var give = (d.to_give||[]).map(function(g){
    return '<div class="gift-row"><span>'+esc(g.name)+(g.puzzle?' <span class="pill">🧩'+g.puzzle+'</span>':'')+'</span>'+
      (g.received?'<span class="tag recv">받음'+(g.giver?' · '+esc(g.giver):'')+'</span>':'<span class="tag need">받아야</span>')+'</div>';
  }).join("") || '<div class="msg">공개된 위시가 없어요</div>';
  var givers = (d.givers||[]).map(function(g){
    return '<div class="giver-row"><div><div class="giver-name">'+esc(g.name)+(g.relationship?' <span class="pill">'+esc(g.relationship)+'</span>':'')+'</div>'+
      '<div class="giver-meta">'+esc((g.items||[]).join(", "))+'</div>'+
      ((g.messages||[]).length?'<div class="msg">“'+esc(g.messages[0])+'”</div>':'')+'</div>'+
      '<div class="num"><b>'+g.pieces+'</b><br/><span style="font-size:11px;color:#a8a098">조각</span></div></div>';
  }).join("") || '<div class="msg">아직 선물한 지인이 없어요</div>';
  var tl = (d.recent||[]).slice(0,12).map(function(e){
    var t=new Date(e.created_at); var hh=("0"+t.getHours()).slice(-2)+":"+("0"+t.getMinutes()).slice(-2);
    return '<div class="tl">'+t.getMonth()+1+'/'+t.getDate()+' '+hh+' · '+esc(e.actor||"")+(e.name?'('+esc(e.name)+')':'')+' · '+esc(e.type)+'</div>';
  }).join("");
  document.getElementById("detail").innerHTML =
    '<div class="sec"><div class="sec-title">전환</div><div style="font-size:13px">👀 '+f.views+' → 🛍 '+f.gift_clicks+' → 🎁 '+f.gifts_done+' · ❤️ '+f.hearts+' · 💬 '+f.comments+' · 🎮 '+(f.miniapps||0)+' 미니앱</div></div>'+
    '<div class="sec"><div class="sec-title">누구에게 줘야 / 받았는지</div>'+give+'</div>'+
    '<div class="sec"><div class="sec-title">누가 얼마나 조각을 썼는지</div>'+givers+'</div>'+
    '<div class="sec"><div class="sec-title">최근 활동</div>'+(tl||'<div class="msg">없음</div>')+'</div>';
}
document.getElementById("gate-btn").onclick=function(){
  KEY=document.getElementById("key-input").value.trim();
  localStorage.setItem("bbx_admin_key",KEY);
  loadAll();
};
document.getElementById("key-input").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("gate-btn").click();});
document.getElementById("search").addEventListener("input",function(e){loadMembers(e.target.value);});
document.getElementById("refresh").onclick=function(){loadAll();};
if(KEY) loadAll();
</script>
</body>
</html>
