<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>{{OG_TITLE}}</title>
<meta name="description" content="{{OG_DESC}}"/>
<!-- 카카오톡/SNS 링크 미리보기 (서버에서 가족 데이터로 주입) -->
<meta property="og:type" content="website"/>
<meta property="og:title" content="{{OG_TITLE}}"/>
<meta property="og:description" content="{{OG_DESC}}"/>
<meta property="og:image" content="{{OG_IMAGE}}"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="/css/share.css?v=5"/>
<script>window.__BABY_ID__="{{BABY_ID}}";</script>
</head>
<body>
<main id="share-root" class="share-root">
<div class="share-loading">불러오는 중…</div>
</main>

<div class="gift-modal hidden" id="gift-modal">
<div class="gift-modal-backdrop" id="gift-modal-backdrop"></div>
<div class="gift-modal-card">
<button type="button" class="gift-modal-close" id="gift-modal-close">✕</button>
<div class="gift-modal-emoji">🎁</div>
<h3 class="gift-modal-title" id="gift-modal-title"></h3>
<p class="gift-modal-desc" id="gift-modal-desc"></p>
<div class="gift-modal-coupon">🎟️ 선물하면 <b>키디키디 선물 할인 쿠폰</b>을 드려요</div>
<a class="gift-modal-go" id="gift-modal-go" href="#" target="_blank" rel="noopener">키디키디에서 선물하기 →</a>
</div>
</div>

<div class="gift-sheet hidden" id="gift-sheet">
<div class="gift-sheet-backdrop" id="gift-sheet-backdrop"></div>
<div class="gift-sheet-panel">
<div class="gift-sheet-head">
<strong id="gift-sheet-title">조각 채우기</strong>
<button type="button" class="gift-sheet-close" id="gift-sheet-close">✕</button>
</div>
<div class="gift-sheet-body" id="gift-sheet-body"></div>
</div>
</div>

<div class="cmt-sheet hidden" id="cmt-sheet">
<div class="cmt-backdrop" id="cmt-backdrop"></div>
<div class="cmt-panel">
<div class="cmt-handle"></div>
<div class="cmt-title">댓글</div>
<div class="cmt-list" id="cmt-list"></div>
<div class="cmt-input-row">
<input type="text" id="cmt-name" class="cmt-name" placeholder="이름(선택)" maxlength="12"/>
<input type="text" id="cmt-text" class="cmt-text" placeholder="댓글을 남겨주세요" maxlength="200"/>
<button type="button" id="cmt-send" class="cmt-send">등록</button>
</div>
</div>
</div>

<script src="/js/share.js?v=4"></script>
</body>
</html>
