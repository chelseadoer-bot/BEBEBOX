<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>글로벌 작명소 — KIDIKIDI</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --bg:#F0F7FF;--bg2:#E8F4FD;--bg3:#DBEAFE;
  --card:#FFFFFF;--ink:#1E293B;--ink2:#475569;--ink3:#64748B;--ink4:#94A3B8;
  --border:#DBEAFE;
  --brand:#4A90E2;--brand-l:#EFF6FF;--brand-d:#2563EB;
  --accent:#4A90E2;--accent-l:#EFF6FF;--accent-d:#2563EB;
  --shadow:rgba(30,58,95,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 8%,rgba(74,144,226,0.07) 0%,transparent 55%),radial-gradient(ellipse at 8% 92%,rgba(56,189,248,0.05) 0%,transparent 55%);pointer-events:none;z-index:0;}
.app{width:100%;max-width:480px;min-height:100vh;position:relative;z-index:1;padding-bottom:60px;}
.header{padding:40px 24px 28px;text-align:center;position:relative;}
.header-badge{display:inline-flex;align-items:center;gap:5px;background:var(--brand-l);color:var(--brand-d);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:14px;}
.app-emoji{font-size:44px;display:block;margin-bottom:14px;}
.header h1{font-size:24px;font-weight:700;line-height:1.45;color:var(--ink);margin-bottom:8px;letter-spacing:-0.03em;}
.header h1 .acc{color:var(--accent);}
.header p{font-size:13px;color:var(--ink3);line-height:1.7;}
.section{padding:0 20px 18px;}
.sec-label{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;margin-bottom:10px;display:flex;align-items:center;gap:7px;}.sec-label::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--brand);flex-shrink:0;}
.ifield{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:700;color:var(--ink);outline:none;transition:all 0.2s;}
.ifield::placeholder{color:var(--ink4);font-weight:400;}
.ifield:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-l);}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.igroup label{display:block;font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.chip{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--ink2);font-size:12px;font-weight:800;cursor:pointer;transition:all 0.15s;font-family:'Pretendard',sans-serif;}
.chip:hover{border-color:var(--ink3);}
.chip.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent-d);}
.locale-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.locale-chip{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.18s;font-family:'Pretendard',sans-serif;text-align:left;width:100%;}
.locale-chip:hover{border-color:var(--brand);background:var(--brand-l);}
.locale-chip.sel{border-color:var(--accent);background:var(--accent-l);}
.locale-flag{font-size:26px;flex-shrink:0;line-height:1;}
.locale-label{font-size:13px;font-weight:800;color:var(--ink);line-height:1.3;}
.locale-sub{font-size:10px;font-weight:600;color:var(--ink3);margin-top:1px;}
.locale-chip.sel .locale-label{color:var(--accent-d);}
.locale-chip.sel .locale-sub{color:var(--accent);}
.locale-chip:active{transform:scale(0.97);}
.btn-primary{width:calc(100% - 40px);margin:0 20px 20px;padding:18px;border:none;border-radius:12px;background:var(--brand);color:#fff;font-family:'Pretendard',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 5px 20px rgba(74,144,226,0.3);display:block;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(74,144,226,0.4);}
.btn-primary:disabled{opacity:0.45;cursor:default;transform:none;box-shadow:none;}
.loading-wrap{display:none;padding:0 20px 20px;}
.loading-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 22px;text-align:center;box-shadow:0 4px 20px var(--shadow);}
.loading-emoji{font-size:52px;display:block;margin-bottom:16px;animation:loadSpin 2s ease-in-out infinite;}
@keyframes loadSpin{0%,100%{transform:scale(1)rotate(-5deg);}50%{transform:scale(1.08)rotate(5deg);}}
.loading-title{font-size:17px;color:var(--ink);margin-bottom:6px;}
.loading-sub{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:20px;}
.step-list{display:flex;flex-direction:column;gap:8px;}
.step-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:11px;background:var(--bg2);font-size:12px;color:var(--ink4);font-weight:700;transition:all 0.4s;}
.step-item.on{background:var(--accent-l);color:var(--accent-d);}
.step-item.done{opacity:0.4;}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all 0.4s;}
.step-item.on .step-dot{background:var(--accent);animation:dotBlink 0.7s infinite;}
@keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:0;}}
.result-wrap{display:none;padding:0 20px 32px;}
.r-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:13px;box-shadow:0 1px 3px var(--shadow);}
.r-card-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.r-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--accent-l);}
.r-title{font-size:13px;font-weight:800;color:var(--ink2);}
.r-sub{font-size:11px;color:var(--ink3);font-weight:700;margin-top:1px;}
.r-body{font-size:13px;font-weight:700;color:var(--ink2);line-height:1.8;}
.r-hero{background:linear-gradient(135deg,var(--accent-l) 0%,#fff 100%);border:1px solid rgba(0,0,0,0.06);border-radius:18px;padding:24px 20px;margin-bottom:13px;text-align:center;position:relative;overflow:hidden;}
.r-hero::after{content:attr(data-emoji);position:absolute;font-size:80px;opacity:0.07;right:-10px;bottom:-10px;}
.r-hero-badge{display:inline-block;background:var(--accent-l);border:1px solid rgba(0,0,0,0.06);color:var(--accent-d);font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:4px 13px;border-radius:20px;margin-bottom:12px;}
.r-hero-title{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:5px;line-height:1.3;}
.r-hero-sub{font-size:13px;color:var(--ink3);}
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.btn-share{padding:14px;border-radius:14px;font-family:'Pretendard',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all 0.18s;border:1px solid var(--border);background:var(--card);color:var(--ink2);text-align:center;}
.btn-share.primary{background:var(--brand);color:#fff;border:none;box-shadow:0 4px 14px rgba(74,144,226,0.22);}
.btn-share:hover{transform:translateY(-1px);}
.err-box{display:none;margin:0 20px 18px;background:#FEF0EF;border:1px solid rgba(220,60,60,0.2);border-radius:14px;padding:16px;text-align:center;font-size:13px;font-weight:700;color:#C03020;line-height:1.6;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-badge">글로벌 작명소</div>
  <span class="app-emoji">🌍</span>
  <h1>이 아이의 이름,<br><span class="acc">원하는 나라</span> 스타일로</h1>
  <p>나라·언어를 고르면 그에 맞는<br>트렌디한 이름 3가지를 추천해 드려요</p>
</div>

<div class="section" id="input-section">
  <div style="display:flex;justify-content:center;margin-bottom:18px;">
    <label for="photo-input" style="cursor:pointer;">
      <div id="photo-circle" style="width:100px;height:100px;border-radius:50%;border:2px dashed var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:all 0.2s;">
        <img id="photo-preview" src="" style="width:100%;height:100%;object-fit:cover;position:absolute;display:none;border-radius:50%;">
        <span style="font-size:26px;">📷</span>
        <span id="photo-lbl" style="font-size:10px;font-weight:800;color:var(--ink3);">사진 추가</span>
      </div>
    </label>
    <input type="file" id="photo-input" accept="image/*" style="display:none;">
  </div>
  <div class="input-row">
    <div class="igroup"><label>한국어 이름</label><input class="ifield" id="k-name" placeholder="예: 김서연" maxlength="20"></div>
    <div class="igroup"><label>나이 (선택)</label><input class="ifield" id="k-age" placeholder="예: 5살" maxlength="8"></div>
  </div>
  <div class="sec-label" style="margin-top:4px;">성별</div>
  <div class="chips" style="margin-bottom:16px;">
    <span class="chip sel" id="g-girl" onclick="setGender('girl')">👧 여자아이</span>
    <span class="chip" id="g-boy" onclick="setGender('boy')">👦 남자아이</span>
  </div>
  <div class="sec-label">짓고 싶은 나라 · 언어</div>
  <div class="locale-grid" id="locale-grid">
    <button type="button" class="locale-chip" data-locale="en" onclick="setLocale('en')">
      <span class="locale-flag">🇺🇸</span><div><div class="locale-label">영어</div><div class="locale-sub">English</div></div>
    </button>
    <button type="button" class="locale-chip" data-locale="zh" onclick="setLocale('zh')">
      <span class="locale-flag">🇨🇳</span><div><div class="locale-label">중국어</div><div class="locale-sub">Chinese</div></div>
    </button>
    <button type="button" class="locale-chip" data-locale="jp" onclick="setLocale('jp')">
      <span class="locale-flag">🇯🇵</span><div><div class="locale-label">일본어</div><div class="locale-sub">Japanese</div></div>
    </button>
    <button type="button" class="locale-chip" data-locale="de" onclick="setLocale('de')">
      <span class="locale-flag">🇩🇪</span><div><div class="locale-label">독일어</div><div class="locale-sub">German</div></div>
    </button>
  </div>
</div>
<button class="btn-primary" id="btn-gen" onclick="generateNames()">이름 3개 추천받기</button>

<div class="loading-wrap" id="loading-wrap">
  <div class="loading-card">
    <span class="loading-emoji">🌐</span>
    <div class="loading-title" id="loading-title">이름을 찾고 있어요</div>
    <div class="loading-sub" id="loading-sub">선택한 언어에 맞는 트렌디한 이름을 고르고 있어요</div>
    <div class="step-list">
      <div class="step-item" id="s1"><div class="step-dot"></div>이름 후보 1 선정 중...</div>
      <div class="step-item" id="s2"><div class="step-dot"></div>이름 후보 2 선정 중...</div>
      <div class="step-item" id="s3"><div class="step-dot"></div>이름 후보 3 선정 중...</div>
    </div>
  </div>
</div>
<div class="err-box" id="err-box"></div>
<div class="result-wrap" id="result-wrap"></div>
</div>
<div class="toast" id="toast"></div>

<script src="kidikidi-app.js?v=3"></script>
<script>
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function animSteps(ids,interval){
  ids.forEach(function(id){var el=document.getElementById(id);if(el)el.className='step-item';});
  var i=0;var timer=setInterval(function(){
    if(i>0){var p=document.getElementById(ids[i-1]);if(p)p.classList.add('done');}
    if(i<ids.length){var c=document.getElementById(ids[i]);if(c)c.classList.add('on');i++;}else clearInterval(timer);
  },interval||1000);return timer;
}
var gender='girl', selectedLocale=null;
var LOCALES={en:{flag:'🇺🇸',label:'영어'},zh:{flag:'🇨🇳',label:'중국어'},jp:{flag:'🇯🇵',label:'일본어'},de:{flag:'🇩🇪',label:'독일어'}};
document.getElementById('photo-input').addEventListener('change',function(e){
  var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(ev){var img=document.getElementById('photo-preview');img.src=ev.target.result;img.style.display='block';document.getElementById('photo-lbl').style.display='none';};
  r.readAsDataURL(f);
});
function setGender(g){gender=g;document.getElementById('g-girl').classList.toggle('sel',g==='girl');document.getElementById('g-boy').classList.toggle('sel',g==='boy');}
function setLocale(loc){selectedLocale=loc;document.querySelectorAll('.locale-chip').forEach(function(el){el.classList.toggle('sel',el.getAttribute('data-locale')===loc);});}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function generateNames(){
  var name=document.getElementById('k-name').value.trim();
  if(!name){showToast('이름을 입력해 주세요 ✏️');return;}
  if(!selectedLocale){showToast('나라·언어를 선택해 주세요 🌍');return;}
  var loc=LOCALES[selectedLocale];
  var age=document.getElementById('k-age').value.trim();
  var photoSrc=document.getElementById('photo-preview').src;
  if(photoSrc===window.location.href) photoSrc='';
  document.getElementById('btn-gen').disabled=true;
  document.getElementById('loading-wrap').style.display='block';
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('err-box').style.display='none';
  document.getElementById('loading-title').textContent=loc.flag+' '+loc.label+' 이름 찾는 중';
  var t=animSteps(['s1','s2','s3'],900);
  try{
    var res=await KD.run({name:name,gender:gender,age:age,locale:selectedLocale,photo:photoSrc});
    clearInterval(t);
    document.getElementById('loading-wrap').style.display='none';
    renderResult(res.output,false);
    document.getElementById('btn-gen').disabled=false;
  }catch(e){
    clearInterval(t);
    document.getElementById('loading-wrap').style.display='none';
    document.getElementById('err-box').textContent=(e&&e.message)?e.message:'이름 생성 중 오류가 발생했어요.';
    document.getElementById('err-box').style.display='block';
    document.getElementById('btn-gen').disabled=false;
  }
}

function buildResultHtml(d){
  var loc=LOCALES[d.locale||'en']||LOCALES.en;
  var name=d.input_name||'';
  var g=d.gender||'girl';
  var photoSrc=d.photo||'';
  var photoHtml=photoSrc?'<img src="'+photoSrc+'" style="width:100%;height:100%;object-fit:cover;">':'<span style="font-size:38px;">'+(g==='girl'?'👧':'👦')+'</span>';
  var cardsHtml=(d.suggestions||[]).map(function(item,idx){
    var ld=item||{name:'-',pronunciation:'-',trend_tag:'-',persona:'-'};
    var persona=escHtml(ld.persona).replace(/\\n/g,'<br>').replace(/\n/g,'<br>');
    return '<div class="r-card"><div class="r-card-head"><div class="r-icon" style="font-size:16px;font-weight:800;background:var(--accent-l);color:var(--accent-d);">'+(idx+1)+'</div><div><div class="r-title">'+loc.label+' 추천 '+(idx+1)+'</div><div class="r-sub">'+escHtml(ld.pronunciation)+' 발음</div></div><span style="margin-left:auto;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--accent-l);color:var(--accent-d);">'+escHtml(ld.trend_tag)+'</span></div><div style="font-size:26px;font-weight:700;color:var(--ink);margin-bottom:6px;">'+escHtml(ld.name)+'</div><div style="font-size:12px;font-weight:800;color:var(--ink3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;">✦ 이름 설명</div><div class="r-body" style="line-height:1.65;">'+persona+'</div></div>';
  }).join('');
  return '<div class="r-hero" data-emoji="'+loc.flag+'"><div style="width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:var(--bg2);">'+photoHtml+'</div><div class="r-hero-badge">'+loc.flag+' '+loc.label+'</div><div class="r-hero-title">'+escHtml(name)+'</div><div class="r-hero-sub">'+escHtml(d.korean_meaning)+'</div></div>'+cardsHtml;
}

function renderResult(d,isHistory){
  document.getElementById('input-section').style.display='none';
  document.getElementById('btn-gen').style.display='none';
  var html=buildResultHtml(d)+
    '<button class="btn-share primary" style="width:100%;margin-top:6px;" onclick="shareResult()">📔 일기에 저장하고 공유하기</button><div class="share-row"><button class="btn-share" onclick="copyRes()">📋 이미지 복사</button><button class="btn-share" onclick="location.reload()">🔄 다시 만들기</button></div>';
  var wrap=document.getElementById('result-wrap');
  wrap.innerHTML=html;wrap.style.display='block';
  var loc=LOCALES[d.locale||'en']||LOCALES.en;
  window._copyText='🌍 '+(d.input_name||'')+' · '+loc.label+' 이름 추천\n'+(d.korean_meaning||'')+'\n\n'+(d.suggestions||[]).map(function(s,i){return (i+1)+'. '+(s.name||'')+' ('+(s.pronunciation||'')+')\n'+(s.persona||'');}).join('\n\n');
  setTimeout(function(){wrap.scrollIntoView({behavior:'smooth',block:'start'});},100);
}
function copyRes(){KD.copyShot({filename:'kidikidi-naming.png'});}
function shareResult(){KD.shareSquare({target:'#result-wrap',title:'글로벌 작명소',caption:'우리 아이 글로벌 이름 추천 결과 🌍',filename:'kidikidi-naming'});}

KD.mountHistory({
  mountTarget: document.querySelector('.app'),
  label: function(r){ var o=r.output||{}; var loc=LOCALES[o.locale||'en']||{label:''}; return (o.input_name||'이름')+' · '+loc.label; },
  renderRecord: function(rec, c){ c.innerHTML=buildResultHtml(rec.output||{}); }
});
</script>
</body>
</html>
